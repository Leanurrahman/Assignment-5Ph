<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- //tittle and logo -->
  <title>GitHub Issues | Tracker</title>

  <!-- Font awsome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- font integration -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet" />
  <!-- Tailwinf+daisy UI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- style -->
  <link rel="stylesheet" href="./style/style.css" />
</head>

<body class="bg-[#F8FAFC] min-h-screen">
  
  <header>
    <!-- left side header -->
    <div class="navbar bg-base-100 shadow-sm justify-between">
      <div class="flex items-center gap-2 ml-5">
        <img src="./assets/github-logo.png" class="h-[37px] w-9 text-gray-900" />
        <a class="font-semibold text-xl">GitHub Issues Tracker</a>
      </div>

      <!-- right side search bar and button -->
      <div class="flex gap-2 mr-5">
        <!-- search box -->
        <label class="input">
          <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input id="search-input" type="search" required placeholder="Search" />
        </label>

        <button id="search-btn"
          class="btn bg-[#4A00FF] hover:bg-[#3b00cc] text-white font-medium px-6 py-2 rounded-md flex items-center gap-2 border-none shadow-sm">
          <i class="fa-solid fa-plus"></i>
          <span>New Issue</span>
        </button>
      </div>
    </div>
  </header>


  <section class="container mx-auto p-4">
    <div class="mt-8 w-full bg-white border border-gray-200 rounded-lg h-[88px] flex items-center px-6 shadow-sm">

      <div class="flex items-center gap-3">
        <button id="all-btn"
          class="btn bg-[#4A00FF] hover:bg-[#3b00cc] text-white font-medium px-8 py-2 rounded-md border-none shadow-sm min-w-[120px] h-10 transition-colors">
          All
        </button>

        <button id="open-btn"
          class="btn bg-white hover:bg-gray-100 text-gray-600 font-medium px-8 py-2 rounded-md border border-gray-300 shadow-sm min-w-[120px] h-10 transition-colors">
          Open
        </button>

        <button id="closed-btn"
          class="btn bg-white hover:bg-gray-100 text-gray-600 font-medium px-8 py-2 rounded-md border border-gray-300 shadow-sm min-w-[120px] h-10 transition-colors">
          Closed
        </button>
      </div>
    </div>
  </section>


  <section class="container mx-auto p-4">
    <div
      class="w-full bg-white border border-gray-200 rounded-lg h-[88px] flex items-center justify-between px-6 shadow-sm">

      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center">
       
          <img src="./assets/Aperture.png" alt="Logo" class="w-6 h-6 object-contain" />
        </div>

        <div>
          <h2 id="issues-count" class="text-lg font-semibold text-gray-900">
            50 Issues
          </h2>
          <p class="text-sm text-gray-500">
            Track and manage your project issues
          </p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-green-500"></span>
          <span class="text-sm font-medium text-gray-700">Open</span>
          </img>

          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-purple-500"></span>
            <span class="text-sm font-medium text-gray-700">Closed</span>
          </div>
        </div>
      </div>
  </section>


  <!-- loading section -->
  <section id="loading-section" class="hidden">
    <div class="flex justify-center py-20">
      <span class="loading loading-bars loading-xs text-[#4A00FF]"></span>
      <span class="loading loading-bars loading-sm text-[#4A00FF]"></span>
      <span class="loading loading-bars loading-md text-[#4A00FF]"></span>
      <span class="loading loading-bars loading-lg text-[#4A00FF]"></span>
      <span class="loading loading-bars loading-xl text-[#4A00FF]"></span>
    </div>
  </section>



 <!-- ei div er vitore shb card gula shbe -->
  <div id="issues-container" class="container mx-auto p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">


  </div>

   <!-- Modal  -->
  <dialog id="issue-details-modal" class="modal">
    <div class="modal-box w-11/12 max-w-3xl p-0 overflow-hidden rounded-xl shadow-2xl">
      <!-- modal header part -->
      <div class="p-6 border-b border-gray-100 bg-white">
        <div class="flex justify-between items-start gap-4">
          <h2 id="modal-title" class="text-2xl font-bold text-gray-900 leading-tight">
            Issue Title
          </h2>
          <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">
              ✕
            </button>
          </form>
        </div>

        <div class="flex items-center gap-3 mt-4 text-sm text-gray-500">
          <span id="modal-status-badge"
            class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
            Opened
          </span>
          <span>•</span>
          <span>Opened by
            <span id="modal-author" class="font-medium text-gray-700">Author Name</span></span>
          <span>•</span>
          <span id="modal-date">DD/MM/YYYY</span>
        </div>
      </div>

      <!-- modal body-->
      <div class="p-6 bg-white">
        <!-- লেবেলস -->
        <div id="modal-labels" class="flex flex-wrap gap-2 mb-6">
          <!-- lable eikhne ashbe -->
        </div>

        <!-- modal description -->
        <p id="modal-description" class="text-gray-700 leading-relaxed mb-8">
          Issue description will go here...
        </p>

        <!-- Assignee and Priority -->
        <div class="bg-gray-50 rounded-lg p-5 grid grid-cols-2 gap-4">
          <div>
            <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">
              Assignee:
            </p>
            <p id="modal-assignee" class="font-semibold text-gray-900">
              Name
            </p>
          </div>
          <div>
            <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">
              Priority:
            </p>
            <span id="modal-priority"
              class="inline-block px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700">HIGH</span>
          </div>
        </div>
      </div>

      <!-- modal er footer part -->
      <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end">
        <form method="dialog">
          <button class="btn bg-[#4A00FF] hover:bg-[#3b00cc] text-white border-none">
            Close
          </button>
        </form>
      </div>
    </div>

    <!-- modal er bhaire click kore bondho hbe-->
    <form method="dialog" class="modal-backdrop">
      <button>close</button>
    </form>
  </dialog>



  <script src="./script/script.js"></script>
</body>

</html>
