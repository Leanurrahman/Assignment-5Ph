<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- //tittle and logo -->
    <title>GitHub Issues | Tracker</title>
    <link rel="shortcut icon" href="/assets/logo.png" type="image/x-icon" />

    <!-- Font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet" />
        
    <!-- Tailwinf+daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- style -->
    <link rel="stylesheet" href="/style/style.css" />
</head>

<body class="bg-white min-h-screen flex items-center justify-center p-4">

    <!-- Login Card -->
    <div class="w-full max-w-[520px] h-[743px] bg-white border border-gray-300 rounded-lg shadow-sm p-8">

        <!-- Header -->
        <div class="text-center mb-8">
            <img src="./assets/github-logo.png" class="mx-auto mb-4 fill-current  h-[100px] w-[100px] text-gray-900">

            </img>
            <h1 class="text-2xl font-semibold text-gray-900">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
        </div>

        <!-- form -->
        <form id="login-form" class="space-y-5">

            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                    placeholder="Enter Username" required />
                <p class="text-xs text-gray-500 mt-1">Default: <span class="font-mono text-purple-600">admin</span></p>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                    placeholder="Enter Password" required />
                <p class="text-xs text-gray-500 mt-1">Default: <span class="font-mono text-purple-600">admin123</span>
                </p>
            </div>

            <!-- Error Message show here-->
            <p id="error-msg" class="text-red-600 text-sm hidden text-center font-medium">Invalid Username or Password!
            </p>
            <!-- ager button muche new buton show korbe -->
            <button type="submit"
                class="w-full bg-[#4A00FF] hover:bg-[#5a32a3] text-white font-medium py-2 px-4 rounded-md transition-colors duration-200 text-sm cursor-pointer">
                Sign In
            </button>
        </form>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-xs"><span class="px-2 bg-white text-gray-500">OR</span></div>
        </div>

        <div class="bg-gray-50 rounded-md p-4 text-center border border-gray-200">
            <p class="text-xs text-gray-500 mb-2">Demo Credentials:</p>
            <div class="text-sm text-gray-800 space-y-1">
                <p><span class="font-semibold">Username:</span> <span class="font-mono">admin</span></p>
                <p><span class="font-semibold">Password:</span> <span class="font-mono">admin123</span></p>
            </div>
        </div>

    </div>
    <script src="./script/login.js"></script>
</body>

</html>
